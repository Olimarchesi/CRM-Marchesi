<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<title>Marchesi Grafiche Editoriali — CRM</title>

<style>
:root {
  --bg: #F7F4EF;
  --surface: #FFFFFF;
  --surface2: #F0EDE7;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --text: #1A1815;
  --text2: #6B6560;
  --text3: #9E9890;
  --accent: #1A1815;
  --green: #2D6A4F; --green-bg: #EAF4EE;
  --red: #A0291A; --red-bg: #FAEAEA;
  --amber: #7A4F0D; --amber-bg: #FDF3E3;
  --blue: #1A4A7A; --blue-bg: #E8F0FA;
  --purple: #3D2C7A; --purple-bg: #EEEAF8;
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* LAYOUT */
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 220px; flex-shrink: 0; background: var(--text); display: flex; flex-direction: column; padding: 0; }
.sidebar-brand { padding: 28px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-brand .logo { font-family: 'DM Serif Display', serif; color: #fff; font-size: 18px; line-height: 1.2; }
.sidebar-brand .since { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; margin-top: 4px; }
.sidebar-nav { flex: 1; padding: 16px 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent; }
.nav-item:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05); }
.nav-item.active { color: #fff; border-left-color: var(--gold); background: rgba(201,168,76,0.06); }
.nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; }
.nav-item.ai-nav { color: #C9A84C; }
.nav-item.ai-nav.active { color: #C9A84C; border-left-color: #C9A84C; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: rgba(255,255,255,0.3); }

.main { flex: 1; overflow-y: auto; padding: 32px 36px; max-width: 900px; }
.page { display: none; }
.page.active { display: block; }

/* TYPOGRAPHY */
.page-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.stat-card .lbl { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.04em; }
.stat-card .val { font-size: 24px; font-weight: 300; color: var(--text); }
.stat-card .val.green { color: var(--green); }
.stat-card .val.red { color: var(--red); }
.stat-card .val.amber { color: var(--amber); }

/* ROW HEAD */
.row-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }

/* BUTTONS */
.btn { font-family: 'DM Sans', sans-serif; background: transparent; border: 1px solid var(--border2); border-radius: var(--radius); padding: 7px 14px; font-size: 13px; cursor: pointer; color: var(--text); transition: all 0.15s; }
.btn:hover { background: var(--surface2); }
.btn-dark { background: var(--text); color: #fff; border-color: var(--text); }
.btn-dark:hover { background: #333; }
.btn-gold { background: #185FA5; color: white; border-color: #185FA5; }
.btn-gold:hover { background: #0C447C; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-danger { color: var(--red); border-color: rgba(160,41,26,0.3); }
.btn-danger:hover { background: var(--red-bg); }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.card:hover { border-color: var(--border2); }
.card.open { border-color: #C9A84C; }
.card-top { display: flex; align-items: center; gap: 12px; }
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 500; color: var(--text); }
.card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; margin-left: 4px; }
.chevron.open { transform: rotate(180deg); }
.detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.detail.show { display: block; }

/* BADGES */
.badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
.b-ok { background: var(--green-bg); color: var(--green); }
.b-ko { background: var(--red-bg); color: var(--red); }
.b-gray { background: var(--surface2); color: var(--text2); }
.b-amber { background: var(--amber-bg); color: var(--amber); }
.b-blue { background: var(--blue-bg); color: var(--blue); }
.b-gold { background: #FBF3E0; color: #7A5A10; }

/* FORMS */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.form-full { grid-column: 1/-1; }
.form-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; letter-spacing: 0.03em; }
.form-grid input, .form-grid select, .form-grid textarea,
.form-full input, .form-full select, .form-full textarea {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px;
  border: 1px solid var(--border2); border-radius: var(--radius);
  background: var(--bg); color: var(--text); outline: none;
}
.form-grid input:focus, .form-grid select:focus, .form-full input:focus, .form-full select:focus { border-color: #C9A84C; }

/* PERCHE BOX */
.perche-box { background: #FDFAF3; border: 1px solid #E8D99A; border-radius: var(--radius); padding: 12px; margin-top: 10px; }
.perche-lbl { font-size: 12px; color: var(--amber); font-weight: 500; margin-bottom: 6px; }
.perche-box textarea { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px; border: 1px solid #E8D99A; border-radius: var(--radius); background: #fff; color: var(--text); min-height: 56px; resize: none; outline: none; }
.loop-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 10px; border-radius: 999px; background: var(--amber-bg); color: var(--amber); border: 1px solid #E8D99A; margin-top: 6px; }
.note-box { font-size: 13px; color: var(--text2); background: var(--surface2); border-radius: var(--radius); padding: 9px 12px; margin-top: 8px; line-height: 1.55; }

/* FILTERS */
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.pill { font-size: 12px; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border); cursor: pointer; color: var(--text2); background: transparent; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.pill.active { background: var(--text); color: #fff; border-color: var(--text); }

/* ACTION BTNS */
.action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
.inline-select { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 8px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; outline: none; }

/* CHARTS */
.chart-bar-wrap { margin-top: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
.bar-label { width: 120px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
.bar-val { width: 70px; text-align: right; color: var(--text); font-weight: 500; flex-shrink: 0; font-size: 12px; }

/* REPORT BLOCKS */
.report-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 14px; }
.report-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 12px; }

/* MINI STATS */
.mini-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
.mini-stat { background: var(--surface2); border-radius: var(--radius); padding: 10px 12px; }
.mini-stat .lbl { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
.mini-stat .val { font-size: 17px; font-weight: 300; color: var(--text); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-start; justify-content: center; padding-top: 60px; z-index: 200; }
.modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border2); padding: 24px; width: min(500px, 92vw); max-height: 80vh; overflow-y: auto; }
.modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); margin-bottom: 18px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* AI CHAT */
.chat-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; }
.chat-msgs { padding: 20px; display: flex; flex-direction: column; gap: 14px; min-height: 300px; max-height: 460px; overflow-y: auto; }
.msg { display: flex; gap: 10px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
.av-ai { background: var(--text); color: #C9A84C; }
.av-user { background: var(--blue-bg); color: var(--blue); }
.bubble { max-width: 80%; padding: 11px 15px; border-radius: var(--radius-lg); font-size: 13.5px; line-height: 1.6; }
.msg.assistant .bubble { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.msg.user .bubble { background: var(--text); color: #fff; }
.chat-sugs { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 16px 14px; }
.sug { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border2); cursor: pointer; color: var(--text2); background: transparent; transition: all 0.15s; }
.sug:hover { background: var(--surface2); color: var(--text); }
.chat-input-row { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid var(--border); }
.chat-input-row input { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 13px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
.chat-input-row input:focus { border-color: #C9A84C; }
.dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

/* PROSPECT AI */
.prospect-config { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
.prospect-config-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.prospect-config-grid input, .prospect-config-grid select { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 11px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
.prospect-config-grid input:focus, .prospect-config-grid select:focus { border-color: #C9A84C; }
.prospect-pipeline { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--text3); margin-bottom: 16px; flex-wrap: wrap; }
.pipeline-step { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--border); }
.pipeline-step.active { background: #FBF3E0; border-color: #C9A84C; color: #7A5A10; }
.pipeline-step.done { background: var(--green-bg); border-color: #2D6A4F44; color: var(--green); }
.pipeline-arrow { color: var(--border2); }
.prospect-cards { display: flex; flex-direction: column; gap: 14px; }
.prospect-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.prospect-card-header { display: flex; align-items: center; gap: 12px; padding: 16px 18px; cursor: pointer; }
.prospect-card-header:hover { background: var(--surface2); }
.prospect-score { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; flex-shrink: 0; }
.prospect-card-body { padding: 0 18px 18px; display: none; }
.prospect-card-body.show { display: block; }
.intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
.intel-block { background: var(--surface2); border-radius: var(--radius); padding: 12px; }
.intel-block-title { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.intel-block-body { font-size: 13px; color: var(--text); line-height: 1.55; }
.proposal-box { background: #FDFAF3; border: 1px solid #E8D99A; border-radius: var(--radius); padding: 14px; margin-top: 10px; }
.proposal-box-title { font-size: 12px; font-weight: 500; color: var(--amber); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.proposal-box-body { font-size: 13px; color: var(--text); line-height: 1.6; }
.prospect-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.search-progress { padding: 20px; text-align: center; }
.progress-label { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
.progress-steps { display: flex; flex-direction: column; gap: 6px; text-align: left; max-width: 340px; margin: 0 auto; }
.progress-step { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 8px; }
.progress-step.active { color: var(--amber); }
.progress-step.done { color: var(--green); }
.step-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.competitor-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--blue-bg); color: var(--blue); margin: 2px; border: 1px solid rgba(26,74,122,0.15); }

.empty_state { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 13px; }
.empty_icon { font-size: 32px; margin-bottom: 10px; }


.bubble table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 8px; }
.bubble th { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--border2); color: var(--text2); font-weight: 500; }
.bubble td { padding: 5px 8px; border-bottom: 1px solid var(--border); }

.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }

/* RESPONSIVE */
@media (max-width: 700px) {
  .sidebar { width: 60px; }
  .sidebar-brand .logo, .sidebar-brand .since, .nav-item span, .sidebar-footer { display: none; }
  .nav-item { justify-content: center; padding: 12px; }
  .main { padding: 20px 16px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<div class="shell">

<aside class="sidebar">
  <div class="sidebar-brand">

  </div>

</aside>

  <div id="page-attivita" class="page active"></div>
  <div id="page-sintesi" class="page"></div>
  <div id="page-preventivi" class="page"></div>
  <div id="page-clienti" class="page"></div>

<script>
const COLORS=[
  {bg:'#EEF0FB',c:'#2D3B9E'},{bg:'#EAF4EE',c:'#2D6A4F'},
  {bg:'#FDF3E3',c:'#7A4F0D'},{bg:'#EEE8F8',c:'#4A2A8A'},
  {bg:'#FAEAEA',c:'#A0291A'},{bg:'#E8F0FA',c:'#1A4A7A'}
];
function ini(n){return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
let nid=100, expanded={}, aiMsgs=[];
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzdDTtlrrRgN628lmvngALghmbGItDIWE0caT17-b7gWdC-mbEDEfLLOy9Pd0ckzG5c/exec';

async function gsRead(tipo){
  try{
    const r = await fetch(SCRIPT_URL+'?action=read&tipo='+tipo);
    const d = await r.json();
    return d.ok ? d.data : [];
  }catch(e){ console.error('Errore lettura',tipo,e); return []; }
}

async function gsCreate(tipo, record){
  try{
    await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({action:'create', tipo, record})});
  }catch(e){ console.error('Errore creazione',e); }
}

async function gsUpdate(tipo, record){
  try{
    await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({action:'update', tipo, record})});
  }catch(e){ console.error('Errore update',e); }
}

async function gsDelete(tipo, id){
  try{
    await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({action:'delete', tipo, record:{id}})});
  }catch(e){ console.error('Errore delete',e); }
}

async function loadFromSheets(){
  showLoading(true);
  try{
    const [att, prev, cli] = await Promise.all([
      gsRead('Attività'), gsRead('Preventivi'), gsRead('Clienti')
    ]);
    data.attivita = att.map(r=>({...r, id:parseInt(r.id)||r.id, colore:parseInt(r.colore)||0, importo:parseFloat(r.importo)||0, incontri:parseInt(r.incontri)||0, prevFatti:parseInt(r.prevFatti)||0, prevAccettati:parseInt(r.prevAccettati)||0}));
    data.preventivi = prev.map(r=>({...r, id:parseInt(r.id)||r.id, colore:parseInt(r.colore)||0, importo:parseFloat(r.importo)||0}));
    data.clienti = cli.map(r=>({...r, id:parseInt(r.id)||r.id, colore:parseInt(r.colore)||0, fatturato:parseFloat(r.fatturato)||0, incontri:parseInt(r.incontri)||0, prevFatti:parseInt(r.prevFatti)||0, prevAccettati:parseInt(r.prevAccettati)||0}));
    if(data.attivita.length||data.preventivi.length||data.clienti.length){
      nid = Math.max(100, ...data.attivita.map(a=>parseInt(a.id)||0), ...data.preventivi.map(p=>parseInt(p.id)||0), ...data.clienti.map(c=>parseInt(c.id)||0)) + 1;
    }
  }catch(e){ console.error('Errore caricamento sheets',e); }
  showLoading(false);
  renderAll();
}

function showLoading(show){
  let el = document.getElementById('loading-bar');
  if(!el){
    el = document.createElement('div');
    el.id = 'loading-bar';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;height:3px;background:#C9A84C;z-index:9999;transition:opacity 0.3s';
    document.body.appendChild(el);
  }
  el.style.opacity = show ? '1' : '0';
}

const DEMO_DATA={
  attivita:[],
  preventivi:[],
  clienti:[]
};

function fmtBubble(text){
  const lines=text.split('\n');
  let html='', inTable=false, tH='', hDone=false;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(l.trim().startsWith('|')){
      if(!inTable){inTable=true;tH='<table>';hDone=false;}
      if(l.includes('---')){tH+='</thead><tbody>';hDone=true;continue;}
      const cells=l.split('|').filter(c=>c.trim()!=='');
      if(!hDone){tH+='<thead><tr>'+cells.map(c=>`<th>${c.trim()}</th>`).join('')+'</tr>';}
      else{tH+='<tr>'+cells.map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>';}
    } else {
      if(inTable){html+=tH+'</tbody></table>';inTable=false;tH='';}
      html+=l.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')+'<br>';
    }
  }
  if(inTable) html+=tH+'</tbody></table>';
  return html;
}

function removeThinking(){ const el=document.getElementById('thinking'); if(el) el.remove(); }

async function sendAI(){
  const input=document.getElementById('ai-input'); if(!input) return;
  const val=input.value.trim(); if(!val) return;
  input.value='';
  addAIMsg('user', val);
  const btn=document.getElementById('ai-send'); if(btn) btn.disabled=true;
  addThinking();
  const history=aiMsgs.slice(0,-1).map(m=>({role:m.role,content:m.content}));
  history.push({role:'user',content:val});
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:buildSystem(),messages:history})
    });
    const d=await resp.json();
    const reply=d.content?.[0]?.text||'Errore nella risposta.';
    removeThinking(); addAIMsg('assistant', reply);
  } catch(e){ removeThinking(); addAIMsg('assistant','Errore di connessione. Riprova.'); }
  const btn2=document.getElementById('ai-send'); if(btn2) btn2.disabled=false;
}

  prospectState.loading = true;
  prospectState.results = [];
  prospectState.currentStep = 0;
  renderProspect();

  // Animate steps
  const stepInterval = setInterval(() => {
    if(prospectState.currentStep < prospectState.steps.length - 1){
      prospectState.currentStep++;
      renderProspect();
    } else {
      clearInterval(stepInterval);
    }
  }, 7000);

  const prompt = `Sei un agente di intelligence commerciale per Marchesi Grafiche Editoriali, tipografia storica italiana dal 1918, specializzata in stampa di lusso, cataloghi moda, packaging premium, libri d'arte e volumi di pregio.

Il tuo compito: trovare e analizzare ${num} aziende reali nel settore "${settore}", zona "${zona}", dimensione "${dim}", che potrebbero aver bisogno di servizi tipografici e di comunicazione come ${focus}.

Per ogni azienda devi:
1. Identificare un'azienda reale e credibile
2. Analizzare il loro profilo aziendale e storia
3. Valutare la qualità attuale dei loro materiali di comunicazione (sito, cataloghi, packaging, ADV)
4. Identificare 2-3 competitor che si sono evoluti di più nella comunicazione visiva
5. Capire cosa produce/vende e quali lavori tipografici/grafici potrebbero servire
6. Costruire una proposta specifica con l'argomento di ingresso più efficace per Marchesi

Rispondi SOLO con un JSON valido, nessun testo prima o dopo, nessun markdown, questo formato esatto:
{
  "prospects": [
    {
      "nome": "Nome Azienda Srl",
      "settore": "Moda Lusso",
      "zona": "Milano",
      "dimensione": "Media",
      "score": 85,
      "urgenza": "Alta priorità",
      "profilo": "Descrizione azienda, storia, cosa fa, fatturato stimato",
      "comunicazione": "Valutazione attuale: sito datato del 2020, nessuna presenza social strutturata, brochure PDF non aggiornata, identità visiva non coerente",
      "prodotti": "Linee prodotto principali, target di mercato, cosa vendono",
      "competitor": ["Competitor A più evoluto", "Competitor B", "Competitor C"],
      "proposta": "Proposta specifica Marchesi: es. Restyling catalogo stagionale + kit social premium. Argomento di ingresso: i tuoi competitor hanno alzato il livello della comunicazione visiva mentre tu sei rimasto indietro — questo si traduce in percezione di qualità inferiore nonostante il prodotto sia eccellente."
    }
  ]
}

Lo score va da 0 a 100 (opportunità commerciale per Marchesi). urgenza può essere: "Alta priorità", "Media priorità", "Bassa priorità". Genera esattamente ${num} prospects reali e credibili.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    clearInterval(stepInterval);
    const data_resp = await response.json();

    // Extract text from response (may include tool use blocks)
    let text = '';
    if(data_resp.content){
      for(const block of data_resp.content){
        if(block.type === 'text') text += block.text;
      }
    }

    // Parse JSON
    const clean = text.replace(/```json|```/g,'').trim();
    const jsonStart = clean.indexOf('{');
    const jsonEnd = clean.lastIndexOf('}');
    const jsonStr = clean.slice(jsonStart, jsonEnd+1);
    const parsed = JSON.parse(jsonStr);

    prospectState.results = parsed.prospects || [];
    prospectState.currentStep = prospectState.steps.length;

  } catch(e) {
    console.error('Prospect AI error:', e);
    prospectState.results = [{
      nome: 'Errore nella ricerca',
      settore: settore,
      zona: zona,
      dimensione: dim,
      score: 0,
      urgenza: '—',
      profilo: 'Si è verificato un errore durante la ricerca. Riprova.',
      comunicazione: '—',
      prodotti: '—',
      competitor: [],
      proposta: 'Riprova la ricerca.'
    }];
  }

  prospectState.loading = false;
  renderProspect();
}

function aggiungiAlCRM(idx){
  const p = prospectState.results[idx];
  if(!p) return;
  // Map settore to CRM options
  const settoriCRM = ['Moda Lusso','Automotive','Volumi Storici','Arte & Musei','Altro'];
  const settore = settoriCRM.includes(p.settore) ? p.settore : 'Altro';
  const newCli = {
    id: nid++,
    nome: p.nome,
    settore: settore,
    fatturato: 0,
    incontri: 0,
    prevFatti: 0,
    prevAccettati: 0,
    note: `[Prospect AI] ${p.proposta ? p.proposta.slice(0,200) : ''}`,
    colore: data.clienti.length % COLORS.length
  };
  data.clienti.push(newCli);
  gsCreate('Clienti', newCli);
  alert(`✓ ${p.nome} aggiunto ai clienti del CRM`);
  renderAll();
}

function creaAttivita(idx){
  const p = prospectState.results[idx];
  if(!p) return;
  const newAtt = {
    id: nid++,
    cliente: p.nome,
    tipo: 'Proposta commerciale',
    data: new Date().toISOString().slice(0,10),
    gestito: 'Oliviero',
    esito: 'attesa',
    perche: '',
    note: `[Prospect AI] ${p.proposta ? p.proposta.slice(0,300) : ''}`,
    colore: data.attivita.length % COLORS.length
  };
  data.attivita.push(newAtt);
  gsCreate('Attività', newAtt);
  alert(`✓ Attività creata per ${p.nome}`);
  goPage('attivita', document.querySelector('[data-page="attivita"]'));
}


loadFromSheets();
